<app-task-create
  [categoryId]="categoryId"
  [error]="createError"
  [isCreating]="isCreatingTask"
  (create)="onCreateTask($event)">
</app-task-create>

@if(pagedTasks) {
  <app-task-list
    [pagedTasks]="pagedTasks"
    [isLoading]="isLoadingTasks"
    [isError]="isErrorLoadingTasks"
    (deletedTask)="onDeleteTask($event)"
    (editTask)="onStartEdit($event)"
    (toggleIsCompleted)="onToggleIsCompleted($event)">

    <div class="d-flex justify-content-between align-items-center mb-3 ms-2">

      <div class="fs-5 fw-semibold">
        {{ categoryName }}
      </div>

      <div class="d-flex gap-2">

        <button class="btn btn-sm btn-primary" routerLink="/search">
          <i class="bi bi-search"></i>
          Search Tasks
        </button>

        <button
          type="button"
          class="btn btn-sm btn-outline-secondary"
          routerLink="/">
          <i class="bi bi-house"></i>
          Home
        </button>

      </div>

    </div>

  </app-task-list>
}

@if(selectedTask) {
  <app-edit-task-modal
    [isOpen]="isEditOpen"
    [task]="selectedTask"
    [isErrorEditing]="isErrorEditingTask"
    (close)="onCloseEdit()"
    (save)="onSaveEditedTask($event)">
  </app-edit-task-modal>
}

<app-pagination
  [page]="currentPage"
  [totalPages]="pagedTasks?.totalPages ?? 1"
  (pageChange)="onPageChange($event)">
</app-pagination>
