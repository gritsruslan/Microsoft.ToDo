<app-task-create
  [categoryId]="categoryId"
  (created)="loadTasks()">
</app-task-create>

<app-task-list
  [pagedTasks]="taskService.pagedTasks"
  [isLoading]="isLoadingTasks"
  [isError]="isErrorLoadingTasks"
  [categoryName]="categoryName"
  (refresh)="loadTasks()"
>
</app-task-list>

<app-pagination
  [page]="currentPage"
  [totalPages]="taskService.pagedTasks?.totalPages ?? 1"
  (pageChange)="onPageChange($event)">
</app-pagination>
