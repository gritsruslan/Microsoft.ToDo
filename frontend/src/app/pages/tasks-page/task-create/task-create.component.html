<div class="d-flex justify-content-center mt-3">
  <div
    class="card shadow-sm w-100"
    style="max-width: 900px; border-radius: 16px;">

    <div class="card-body p-3">

      <form
        [formGroup]="form"
        (ngSubmit)="createTask()">

        <div class="d-flex gap-2">

          <input
            formControlName="title"
            type="text"
            class="form-control"
            placeholder="Enter a title for the new task">

          <input
            formControlName="dueDate"
            type="datetime-local"
            class="form-control"
            style="max-width: 250px;">

          <button
            type="submit"
            class="btn btn-primary px-4"
            [disabled]="form.invalid || isCreating">

            {{ isCreating ? 'Creating...' : 'Create' }}

          </button>

        </div>

        @if (form.controls.title.touched && form.controls.title.hasError('required')
          ) {
          <div class="text-danger small mt-2">
            Title is required
          </div>
        }

        @if (form.controls.title.touched && form.controls.title.hasError('maxlength')
          ) {
          <div class="text-danger small mt-2">
            Title is too long
          </div>
        }

        @if (error) {
          <div class="text-danger small mt-2">
            {{ error }}
          </div>
        }

      </form>

    </div>
  </div>
</div>
