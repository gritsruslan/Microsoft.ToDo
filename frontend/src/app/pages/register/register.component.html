<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm w-100" style="max-width: 420px;">
    <div class="card-body p-4">

      <h4 class="mb-4 text-center">Microsoft.ToDo Register</h4>

      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()" >

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input formControlName="email" type="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input formControlName="password" type="password" class="form-control" placeholder="Enter password">
        </div>

        @if (validationErrors.length) {
          <div class="alert alert-danger">
            @for (err of validationErrors; track err) {
              <div>{{ err }}</div>
            }
          </div>
        }

        <button type="submit" class="btn btn-primary w-100">
          Register
        </button>

      </form>

      <hr class="my-3">

      <div class="text-center">
        <button type="button" class="btn btn-link p-0">
          Already have an account? Login
        </button>
      </div>

    </div>
  </div>
</div>
