<app-category-create
  [isLoading]="isCreatingCategory"
  [error]="createCategoryError"
  (create)="onCreateCategory($event)">
</app-category-create>

<app-category-list
  [categories]="categoryService.categories"
  [isLoading]="isLoadingCategories"
  [isError]="isErrorLoadingCategories">
</app-category-list>
