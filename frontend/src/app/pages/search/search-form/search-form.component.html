<div class="d-flex justify-content-center mt-3">
  <div
    class="card shadow-sm w-100"
    style="max-width: 900px; border-radius: 16px;">

    <div class="card-body p-3">

      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        class="d-flex gap-2">

        <!-- QUERY INPUT -->
        <input
          type="text"
          class="form-control flex-grow-1"
          formControlName="query"
          placeholder="Enter the task title to search for">

        <select
          class="form-select"
          style="max-width: 180px; min-width: 140px;"
          formControlName="categoryId">

          <option [ngValue]="null">Any</option>

          @for (category of categories$ | async; track category.id) {
            <option [ngValue]="category.id">
              {{ category.name }}
            </option>
          }

        </select>

        <button
          type="submit"
          class="btn btn-primary px-4 d-flex align-items-center justify-content-center"
          [disabled]="form.invalid">

          <i class="bi bi-search me-1"></i>
          Search

        </button>

      </form>

      @if (queryControl.touched && queryControl.invalid) {
        <div class="text-danger small mt-2">
          @if (queryControl.errors?.['maxlength']) {
            Maximum title length is {{ VALIDATION.TASK_TITLE_MAX_LENGTH }} characters
          }
        </div>
      }

    </div>
  </div>
</div>
