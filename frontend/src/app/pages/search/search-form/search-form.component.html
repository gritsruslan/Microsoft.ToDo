<div class="d-flex justify-content-center mt-3">
  <div
    class="card shadow-sm w-100"
    style="max-width: 900px; border-radius: 16px;">

    <div class="card-body p-3">
      <div class="d-flex gap-2">

        <input
          type="text"
          class="form-control"
          [(ngModel)]="query"
          placeholder="Enter the task title to search for">
        <button
          type="button"
          class="btn btn-primary px-4 d-flex align-items-center justify-content-center"
          (click)="onSearch()">

          <i class="bi bi-search me-1"></i>
          Search

        </button>
      </div>
    </div>

  </div>
</div>
