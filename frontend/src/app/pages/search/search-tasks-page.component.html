<app-search-form
  (search)="onSearch($event)">
</app-search-form>

@if(pagedTasks) {

  <app-task-list
    [pagedTasks]="pagedTasks"
    [isLoading]="isLoading"
    [isError]="isError"
    [showCategoryName]="true"
    (deletedTask)="onDeleteTask($event)"
    (editTask)="onEdit($event)"
    (toggleIsCompleted)="onToggleIsCompleted($event)">

    <div class="d-flex justify-content-between align-items-center mb-3 ms-2">
      <div class="fs-5 fw-semibold">
        Search results
      </div>

      <button
        type="button"
        class="btn btn-sm btn-outline-secondary"
        routerLink="/">
        <i class="bi bi-house"></i>
        Home
      </button>
    </div>
  </app-task-list>
}

@if(selectedTask) {
  <app-edit-task-modal
    [isOpen]="isEditOpen"
    [task]="selectedTask"
    (close)="closeEdit()"
    (save)="onSaveEditedTask($event)">
  </app-edit-task-modal>
}

<app-pagination
  [page]="currentPage"
  [totalPages]="pagedTasks?.totalPages ?? 1"
  (pageChange)="onPageChange($event)">
</app-pagination>
