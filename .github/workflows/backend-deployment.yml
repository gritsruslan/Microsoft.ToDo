name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths: 
      - 'backend/**'
      - '.github/workflows/backend-deployment.yml'
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps*.yml'
  workflow_dispatch:


env:
  AZURE_WEBAPP_NAME: microsoft-todo-api
  DOTNET_VERSION: 10.0.x
  API_PROJECT_PATH: backend/Microsoft.ToDo.API/Microsoft.ToDo.API.csproj
  PUBLISH_DIR: ./publish

jobs:
  build-test-deploy:
    
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore backend
        run: dotnet restore ./backend
        
      - name: Build backend
        run: dotnet build ${{ env.API_PROJECT_PATH }} --configuration Release --no-restore
        
      - name: Run tests
        run: dotnet test ./backend --configuration Release --no-restore
        
      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}
      
      - name: Deploy on Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}